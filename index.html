<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>习惯养成 - 每日打卡</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF7F2;
      --bg-deep: #F0EBE3;
      --fg: #2D2A26;
      --muted: #8A857D;
      --accent: #E07B39;
      --accent-light: #F5A66B;
      --success: #4CAF50;
      --success-light: #81C784;
      --card: #FFFFFF;
      --border: #E5E0D8;
      --shadow: rgba(45, 42, 38, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .font-serif { font-family: 'Noto Serif SC', serif; }

    .bg-pattern {
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(circle at 20% 20%, rgba(224, 123, 57, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(76, 175, 80, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      transition: opacity 0.5s ease, transform 0.5s ease;
      z-index: 1;
    }

    .page.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.95);
    }

    .check-btn {
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .check-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--success);
      transform: scale(0);
      border-radius: inherit;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .check-btn.checked::before { transform: scale(1); }
    .check-btn.checked { border-color: var(--success); }

    .check-btn .btn-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    @keyframes checkmark {
      0% { stroke-dashoffset: 24; }
      100% { stroke-dashoffset: 0; }
    }

    .checkmark {
      stroke-dasharray: 24;
      stroke-dashoffset: 24;
    }

    .checked .checkmark {
      animation: checkmark 0.4s ease forwards 0.2s;
    }

    .habit-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .habit-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--shadow);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in { animation: fadeInUp 0.6s ease forwards; }
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.3s; opacity: 0; }
    .delay-4 { animation-delay: 0.4s; opacity: 0; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(45, 42, 38, 0.5);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 100;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 24px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.active .modal-content { transform: translateY(0); }

    .progress-ring { transform: rotate(-90deg); }
    .progress-ring circle { transition: stroke-dashoffset 0.5s ease; }

    .note-card {
      background: linear-gradient(135deg, var(--card) 0%, var(--bg-deep) 100%);
    }

    /* 照片上传区域样式 */
    .upload-zone {
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .upload-zone:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 30px var(--shadow);
    }

    .upload-zone input[type="file"] {
      display: none;
    }

    .photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #F5F0E8 0%, #E8E0D8 100%);
      color: var(--muted);
    }

    .photo-preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .photo-preview.active {
      display: block;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>

  <!-- 静态展示页面 -->
  <div id="landingPage" class="page">
    <div class="min-h-screen flex items-center justify-center p-6">
      <div class="max-w-4xl w-full">
        <div class="text-center mb-12 animate-in">
          <h1 class="font-serif text-4xl md:text-6xl font-black tracking-tight mb-4" style="color: var(--fg);">
            每日习惯
          </h1>
          <p class="text-lg md:text-xl" style="color: var(--muted);">
            坚持的力量，让改变发生
          </p>
        </div>

        <!-- 图片展示区域 - 修改为可上传 -->
        <div class="max-w-md mx-auto animate-in delay-1">
          <label for="fileUpload" class="upload-zone block rounded-xl overflow-hidden" style="border: 2px dashed var(--border); background: var(--card);">
            <div class="aspect-[4/3] relative">
              <!-- 占位提示 -->
              <div id="placeholder" class="photo-placeholder absolute inset-0 flex flex-col items-center justify-center p-8 text-center">
                <svg class="w-16 h-16 mb-4 opacity-40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                <p class="font-medium mb-2">点击上传您的桌面 "Boy" 照片</p>
                <p class="text-sm opacity-60">支持 JPG, PNG 格式</p>
              </div>
              <!-- 图片预览 -->
              <img id="boyPhoto" class="photo-preview w-full h-full object-cover" alt="Boy Photo">
            </div>
          </label>
          <input type="file" id="fileUpload" accept="image/*">
          <p class="text-center mt-4 text-sm" style="color: var(--muted);">点击上方区域选择电脑中的图片</p>
        </div>

        <div class="mt-12 text-center animate-in delay-2">
          <button id="enterBtn" class="px-8 py-4 rounded-full font-medium text-lg transition-all duration-300 hover:scale-105 active:scale-95"
            style="background: var(--accent); color: white; box-shadow: 0 4px 20px rgba(224, 123, 57, 0.3);">
            开始打卡
          </button>
        </div>

        <div class="mt-16 grid grid-cols-3 gap-6 text-center animate-in delay-3">
          <div class="p-4">
            <div class="text-3xl font-serif font-bold" style="color: var(--accent);">21</div>
            <div class="text-sm mt-1" style="color: var(--muted);">天养成习惯</div>
          </div>
          <div class="p-4">
            <div class="text-3xl font-serif font-bold" style="color: var(--success);">95%</div>
            <div class="text-sm mt-1" style="color: var(--muted);">完成率</div>
          </div>
          <div class="p-4">
            <div class="text-3xl font-serif font-bold" style="color: var(--fg);">1000+</div>
            <div class="text-sm mt-1" style="color: var(--muted);">用户信赖</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 小程序打卡页面 -->
  <div id="appPage" class="page hidden">
    <div class="min-h-screen pb-24" style="background: var(--bg);">
      <header class="sticky top-0 z-50 px-4 py-4" style="background: rgba(250, 247, 242, 0.9); backdrop-filter: blur(10px);">
        <div class="flex items-center justify-between max-w-lg mx-auto">
          <button id="backBtn" class="p-2 rounded-full hover:bg-white/50 transition-colors">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 18l-6-6 6-6"/>
            </svg>
          </button>
          <h1 class="font-serif text-xl font-bold">习惯打卡</h1>
          <div class="w-10"></div>
        </div>
      </header>

      <main class="max-w-lg mx-auto px-4">
        <section class="mt-6 animate-in">
          <div class="rounded-2xl p-6" style="background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%); color: white;">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-white/80 text-sm">今日打卡进度</p>
                <p class="text-3xl font-bold mt-1"><span id="todayCount">0</span>/<span id="totalCount">2</span></p>
                <p class="text-white/80 text-sm mt-2" id="streakText">连续打卡 0 天</p>
              </div>
              <div class="relative">
                <svg class="progress-ring" width="80" height="80" viewBox="0 0 80 80">
                  <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="8"/>
                  <circle id="progressCircle" cx="40" cy="40" r="34" fill="none" stroke="white" stroke-width="8"
                    stroke-linecap="round" stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
                </svg>
                <div class="absolute inset-0 flex items-center justify-center">
                  <span id="progressPercent" class="text-lg font-bold">0%</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="mt-6 animate-in delay-1">
          <div class="rounded-xl p-4 flex items-center gap-3" style="background: var(--card); border: 1px solid var(--border);">
            <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style="background: rgba(224, 123, 57, 0.1);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
            </div>
            <p class="text-sm" style="color: var(--muted);" id="tipText">每一次坚持，都是对自己的投资</p>
          </div>
        </section>

        <section class="mt-6">
          <div class="flex items-center justify-between mb-4 animate-in delay-2">
            <h2 class="font-serif text-lg font-bold">今日习惯</h2>
            <button id="addHabitBtn" class="flex items-center gap-1 px-3 py-1.5 rounded-full text-sm transition-colors"
              style="background: rgba(224, 123, 57, 0.1); color: var(--accent);">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14"/>
              </svg>
              添加习惯
            </button>
          </div>
          <div id="habitList" class="space-y-3"></div>
        </section>

        <section class="mt-8">
          <div class="flex items-center justify-between mb-4 animate-in delay-3">
            <h2 class="font-serif text-lg font-bold">心得分享</h2>
            <button id="addNoteBtn" class="text-sm" style="color: var(--accent);">写心得</button>
          </div>
          <div id="notesList" class="space-y-3"></div>
        </section>

        <section class="mt-8">
          <div class="rounded-xl p-5 animate-in delay-4" style="background: var(--card); border: 1px solid var(--border);">
            <h3 class="font-medium mb-4">打卡周期目标</h3>
            <div class="flex gap-2 flex-wrap">
              <button class="cycle-btn px-4 py-2 rounded-full text-sm transition-all" data-cycle="7">7天</button>
              <button class="cycle-btn px-4 py-2 rounded-full text-sm transition-all active" data-cycle="21">21天</button>
              <button class="cycle-btn px-4 py-2 rounded-full text-sm transition-all" data-cycle="30">30天</button>
              <button class="cycle-btn px-4 py-2 rounded-full text-sm transition-all" data-cycle="100">100天</button>
            </div>
            <div class="mt-4 pt-4" style="border-top: 1px solid var(--border);">
              <div class="flex justify-between text-sm">
                <span style="color: var(--muted);">目标周期</span>
                <span id="cycleDisplay" class="font-medium">21 天</span>
              </div>
              <div class="mt-2 h-2 rounded-full overflow-hidden" style="background: var(--bg-deep);">
                <div id="cycleProgress" class="h-full rounded-full transition-all duration-500" style="background: var(--success); width: 0%;"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- 添加习惯模态框 -->
  <div id="habitModal" class="modal-overlay">
    <div class="modal-content">
      <div class="w-12 h-1 rounded-full mx-auto mb-6" style="background: var(--border);"></div>
      <h3 class="font-serif text-xl font-bold mb-4">添加新习惯</h3>
      <input id="habitNameInput" type="text" placeholder="习惯名称" maxlength="20"
        class="w-full px-4 py-3 rounded-xl mb-3 outline-none transition-all"
        style="background: var(--bg-deep); border: 2px solid transparent;"
        onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='transparent'">
      <input id="habitDurationInput" type="number" placeholder="时长（分钟）" min="1" max="480"
        class="w-full px-4 py-3 rounded-xl mb-6 outline-none transition-all"
        style="background: var(--bg-deep); border: 2px solid transparent;"
        onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='transparent'">
      <div class="flex gap-3">
        <button id="cancelHabitBtn" class="flex-1 py-3 rounded-xl font-medium transition-colors"
          style="background: var(--bg-deep); color: var(--muted);">取消</button>
        <button id="confirmHabitBtn" class="flex-1 py-3 rounded-xl font-medium transition-colors"
          style="background: var(--accent); color: white;">确认添加</button>
      </div>
    </div>
  </div>

  <!-- 添加心得模态框 -->
  <div id="noteModal" class="modal-overlay">
    <div class="modal-content">
      <div class="w-12 h-1 rounded-full mx-auto mb-6" style="background: var(--border);"></div>
      <h3 class="font-serif text-xl font-bold mb-4">记录心得</h3>
      <textarea id="noteContentInput" placeholder="分享你的打卡心得..." maxlength="200"
        class="w-full px-4 py-3 rounded-xl mb-4 outline-none transition-all resize-none h-32"
        style="background: var(--bg-deep); border: 2px solid transparent;"
        onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='transparent'"></textarea>
      <div class="flex items-center gap-2 mb-6 overflow-x-auto pb-2">
        <span class="text-sm flex-shrink-0" style="color: var(--muted);">心情：</span>
        <button class="mood-btn text-2xl p-2 rounded-lg transition-all" data-mood="happy">😊</button>
        <button class="mood-btn text-2xl p-2 rounded-lg transition-all" data-mood="proud">😎</button>
        <button class="mood-btn text-2xl p-2 rounded-lg transition-all" data-mood="calm">😌</button>
        <button class="mood-btn text-2xl p-2 rounded-lg transition-all" data-mood="tired">😅</button>
      </div>
      <div class="flex gap-3">
        <button id="cancelNoteBtn" class="flex-1 py-3 rounded-xl font-medium transition-colors"
          style="background: var(--bg-deep); color: var(--muted);">取消</button>
        <button id="confirmNoteBtn" class="flex-1 py-3 rounded-xl font-medium transition-colors"
          style="background: var(--success); color: white;">保存心得</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== 数据初始化 ====================
    const STORAGE_KEYS = {
      habits: 'habit_tracker_habits',
      records: 'habit_tracker_records',
      notes: 'habit_tracker_notes',
      cycle: 'habit_tracker_cycle',
      streak: 'habit_tracker_streak',
      photo: 'habit_tracker_photo'
    };

    const defaultHabits = [
      { id: 1, name: '英语学习', duration: 30, icon: 'book' },
      { id: 2, name: '通识学习', duration: 20, icon: 'globe' }
    ];

    const tips = [
      '每一次坚持，都是对自己的投资',
      '不积跬步，无以至千里',
      '今天的努力，是明天的资本',
      '习惯若不是最好的仆人，便是最差的主人',
      '坚持就是胜利的开始',
      '小习惯，大改变'
    ];

    const moodEmojis = { happy: '😊', proud: '😎', calm: '😌', tired: '😅' };

    let habits = [];
    let todayRecords = {};
    let notes = [];
    let cycleDays = 21;
    let streakDays = 0;
    let selectedMood = 'happy';

    // ==================== 图片上传逻辑 ====================
    const fileUpload = document.getElementById('fileUpload');
    const boyPhoto = document.getElementById('boyPhoto');
    const placeholder = document.getElementById('placeholder');

    // 页面加载时检查是否有保存的图片
    const savedPhoto = localStorage.getItem(STORAGE_KEYS.photo);
    if (savedPhoto) {
      boyPhoto.src = savedPhoto;
      boyPhoto.classList.add('active');
      placeholder.style.display = 'none';
    }

    fileUpload.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          boyPhoto.src = event.target.result;
          boyPhoto.classList.add('active');
          placeholder.style.display = 'none';
          // 保存到 localStorage (Base64)
          try {
            localStorage.setItem(STORAGE_KEYS.photo, event.target.result);
          } catch (e) {
            console.warn("图片过大，无法保存在本地存储中，刷新后需重新上传");
          }
        };
        reader.readAsDataURL(file);
      }
    });

    // ==================== 数据管理 ====================
    function initData() {
      const savedHabits = localStorage.getItem(STORAGE_KEYS.habits);
      habits = savedHabits ? JSON.parse(savedHabits) : [...defaultHabits];

      const today = getTodayKey();
      const savedRecords = localStorage.getItem(STORAGE_KEYS.records);
      const allRecords = savedRecords ? JSON.parse(savedRecords) : {};
      todayRecords = allRecords[today] || {};

      const savedNotes = localStorage.getItem(STORAGE_KEYS.notes);
      notes = savedNotes ? JSON.parse(savedNotes) : [];

      const savedCycle = localStorage.getItem(STORAGE_KEYS.cycle);
      cycleDays = savedCycle ? parseInt(savedCycle) : 21;

      const savedStreak = localStorage.getItem(STORAGE_KEYS.streak);
      streakDays = savedStreak ? parseInt(savedStreak) : 0;
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEYS.habits, JSON.stringify(habits));
      const savedRecords = localStorage.getItem(STORAGE_KEYS.records);
      const allRecords = savedRecords ? JSON.parse(savedRecords) : {};
      allRecords[getTodayKey()] = todayRecords;
      localStorage.setItem(STORAGE_KEYS.records, JSON.stringify(allRecords));
      localStorage.setItem(STORAGE_KEYS.notes, JSON.stringify(notes));
      localStorage.setItem(STORAGE_KEYS.cycle, cycleDays.toString());
      localStorage.setItem(STORAGE_KEYS.streak, streakDays.toString());
    }

    function getTodayKey() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    }

    // ==================== DOM 元素与渲染 ====================
    const landingPage = document.getElementById('landingPage');
    const appPage = document.getElementById('appPage');
    
    document.getElementById('enterBtn').addEventListener('click', () => {
      landingPage.classList.add('hidden');
      appPage.classList.remove('hidden');
      renderHabits();
      renderNotes();
      updateStats();
    });

    document.getElementById('backBtn').addEventListener('click', () => {
      appPage.classList.add('hidden');
      landingPage.classList.remove('hidden');
    });

    function renderHabits() {
      const habitList = document.getElementById('habitList');
      habitList.innerHTML = habits.map((habit, index) => {
        const isChecked = todayRecords[habit.id] === true;
        return `
          <div class="habit-card rounded-xl p-4 animate-in" style="background: var(--card); border: 1px solid var(--border); animation-delay: ${index * 0.1}s;">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center"
                  style="background: ${isChecked ? 'var(--success-light)' : 'rgba(224, 123, 57, 0.1)'};">
                  ${getHabitIcon(habit.icon, isChecked)}
                </div>
                <div>
                  <h3 class="font-medium ${isChecked ? 'line-through opacity-60' : ''}">${habit.name}</h3>
                  <p class="text-sm" style="color: var(--muted);">${habit.duration} 分钟</p>
                </div>
              </div>
              <button class="check-btn w-14 h-14 rounded-xl border-2 flex items-center justify-center transition-all ${isChecked ? 'checked' : ''}"
                style="border-color: ${isChecked ? 'var(--success)' : 'var(--border)'}; background: ${isChecked ? 'var(--success)' : 'transparent'};"
                data-habit-id="${habit.id}" ${isChecked ? 'disabled' : ''}>
                <span class="btn-content">
                  ${isChecked ? `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path class="checkmark" d="M5 12l5 5 9-9"/></svg>` : `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>`}
                </span>
              </button>
            </div>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.check-btn:not(.checked)').forEach(btn => {
        btn.addEventListener('click', handleCheck);
      });
    }

    function getHabitIcon(type, checked) {
      const color = checked ? 'white' : 'var(--accent)';
      const icons = {
        book: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
        globe: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
        default: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`
      };
      return icons[type] || icons.default;
    }

    function handleCheck(e) {
      const btn = e.currentTarget;
      const habitId = parseInt(btn.dataset.habitId);
      todayRecords[habitId] = true;
      saveData();
      updateStreak();
      btn.classList.add('checked');
      btn.disabled = true;
      setTimeout(() => { renderHabits(); updateStats(); }, 400);
    }

    function renderNotes() {
      const notesList = document.getElementById('notesList');
      if (notes.length === 0) {
        notesList.innerHTML = `<div class="text-center py-8 opacity-60"><p class="text-sm" style="color: var(--muted);">还没有心得，点击"写心得"记录你的感受</p></div>`;
        return;
      }
      notesList.innerHTML = notes.slice().reverse().map(note => `
        <div class="note-card rounded-xl p-4" style="border: 1px solid var(--border);">
          <div class="flex items-start justify-between mb-2">
            <span class="text-2xl">${moodEmojis[note.mood] || '😊'}</span>
            <span class="text-xs" style="color: var(--muted);">${note.date}</span>
          </div>
          <p class="text-sm leading-relaxed">${note.content}</p>
        </div>
      `).join('');
    }

    function updateStats() {
      const total = habits.length;
      const checked = Object.values(todayRecords).filter(v => v).length;
      const percent = total > 0 ? Math.round((checked / total) * 100) : 0;

      document.getElementById('todayCount').textContent = checked;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('progressPercent').textContent = `${percent}%`;
      document.getElementById('streakText').textContent = `连续打卡 ${streakDays} 天`;

      const circumference = 213.6;
      const offset = circumference - (percent / 100) * circumference;
      document.getElementById('progressCircle').style.strokeDashoffset = offset;

      document.getElementById('cycleDisplay').textContent = `${cycleDays} 天`;
      const cycleProgress = Math.min((streakDays / cycleDays) * 100, 100);
      document.getElementById('cycleProgress').style.width = `${cycleProgress}%`;

      document.getElementById('tipText').textContent = tips[Math.floor(Math.random() * tips.length)];
    }

    function updateStreak() {
      const allChecked = habits.every(h => todayRecords[h.id] === true);
      if (allChecked && habits.length > 0) { streakDays += 1; saveData(); }
    }

    // ==================== 模态框交互 ====================
    const habitModal = document.getElementById('habitModal');
    const noteModal = document.getElementById('noteModal');

    document.getElementById('addHabitBtn').addEventListener('click', () => habitModal.classList.add('active'));
    document.getElementById('cancelHabitBtn').addEventListener('click', () => habitModal.classList.remove('active'));
    document.getElementById('confirmHabitBtn').addEventListener('click', () => {
      const name = document.getElementById('habitNameInput').value.trim();
      const duration = parseInt(document.getElementById('habitDurationInput').value) || 30;
      if (name) {
        habits.push({ id: Date.now(), name: name, duration: Math.min(Math.max(duration, 1), 480), icon: 'default' });
        saveData(); renderHabits(); updateStats();
        habitModal.classList.remove('active');
        document.getElementById('habitNameInput').value = '';
        document.getElementById('habitDurationInput').value = '';
      }
    });

    document.getElementById('addNoteBtn').addEventListener('click', () => noteModal.classList.add('active'));
    document.getElementById('cancelNoteBtn').addEventListener('click', () => noteModal.classList.remove('active'));
    
    document.querySelectorAll('.mood-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mood-btn').forEach(b => b.style.background = 'transparent');
        btn.style.background = 'var(--bg-deep)';
        selectedMood = btn.dataset.mood;
      });
    });

    document.getElementById('confirmNoteBtn').addEventListener('click', () => {
      const content = document.getElementById('noteContentInput').value.trim();
      if (content) {
        const now = new Date();
        notes.push({ id: Date.now(), content: content, mood: selectedMood, date: `${now.getMonth() + 1}月${now.getDate()}日` });
        saveData(); renderNotes();
        noteModal.classList.remove('active');
        document.getElementById('noteContentInput').value = '';
      }
    });

    // 点击遮罩关闭
    [habitModal, noteModal].forEach(modal => {
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    });

    // 周期设置
    document.querySelectorAll('.cycle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cycle-btn').forEach(b => { b.style.background = 'var(--bg-deep)'; b.style.color = 'var(--fg)'; });
        btn.style.background = 'var(--accent)'; btn.style.color = 'white';
        cycleDays = parseInt(btn.dataset.cycle); saveData(); updateStats();
      });
    });

    // 初始化
    initData();
    document.querySelector('.mood-btn[data-mood="happy"]').style.background = 'var(--bg-deep)';
    document.querySelectorAll('.cycle-btn').forEach(btn => {
      if (parseInt(btn.dataset.cycle) === cycleDays) {
        btn.style.background = 'var(--accent)'; btn.style.color = 'white';
      } else {
        btn.style.background = 'var(--bg-deep)'; btn.style.color = 'var(--fg)';
      }
    });
  </script>
</body>
</html>
